# ============================================================================
# UI SyncUp — External Services Docker Compose
# ============================================================================
# Generated by: bunx ui-syncup init
# Deployment method: External services (your own DB + S3)
#
# Usage:
#   Start:  bunx ui-syncup up   (or: docker compose up -d)
#   Stop:   bunx ui-syncup down  (or: docker compose down)
#   Update: bunx ui-syncup update
# ============================================================================

services:
  app:
    image: ghcr.io/bykhd/ui-syncup:{{APP_VERSION}}
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.production
    volumes:
      - ./storage/uploads:/app/storage/uploads
      - ./storage/avatars:/app/storage/avatars
