# ============================================================================
# UI SyncUp — All-in-one Docker Compose
# ============================================================================
# Generated by: bunx ui-syncup init
# Deployment method: All-in-one (app + PostgreSQL + MinIO bundled)
#
# Usage:
#   Start:  bunx ui-syncup up   (or: docker compose up -d)
#   Stop:   bunx ui-syncup down  (or: docker compose down)
#   Update: bunx ui-syncup update
# ============================================================================

services:
  app:
    image: ghcr.io/bykhd/ui-syncup:{{APP_VERSION}}
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.production
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./storage/uploads:/app/storage/uploads
      - ./storage/avatars:/app/storage/avatars

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: {{POSTGRES_PASSWORD}}
      POSTGRES_DB: ui-syncup
      POSTGRES_USER: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: {{MINIO_ROOT_USER}}
      MINIO_ROOT_PASSWORD: {{MINIO_ROOT_PASSWORD}}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  minio_data:
