# Branch Protection Configuration
# This file documents the recommended branch protection settings for GitHub.
# These settings must be configured manually in GitHub repository settings.
# Navigate to: Settings > Branches > Branch protection rules

# Main Branch Protection
main:
  # Require pull request reviews before merging
  required_pull_request_reviews:
    required_approving_review_count: 1
    dismiss_stale_reviews: true
    require_code_owner_reviews: false
    require_last_push_approval: false
    
  # Require status checks to pass before merging
  required_status_checks:
    strict: true  # Require branches to be up to date before merging
    contexts:
      - "quality-checks"  # GitHub Actions CI workflow
      - "Vercel – Production"  # Vercel deployment check (optional)
  
  # Enforce restrictions
  enforce_admins: true  # Include administrators in these rules
  
  # Additional protections
  required_linear_history: false
  allow_force_pushes: false
  allow_deletions: false
  required_conversation_resolution: true  # All conversations must be resolved
  lock_branch: false
  allow_fork_syncing: true

# Develop Branch Protection (Optional)
develop:
  required_pull_request_reviews:
    required_approving_review_count: 1
    dismiss_stale_reviews: false
    
  required_status_checks:
    strict: false
    contexts:
      - "quality-checks"
      
  enforce_admins: false
  allow_force_pushes: false
  allow_deletions: false
  required_conversation_resolution: false

# Configuration Instructions:
# 
# 1. Go to GitHub repository settings
# 2. Navigate to "Branches" in the left sidebar
# 3. Click "Add branch protection rule"
# 4. Enter branch name pattern: "main"
# 5. Configure the following settings:
#    - ✓ Require a pull request before merging
#      - ✓ Require approvals (1)
#      - ✓ Dismiss stale pull request approvals when new commits are pushed
#    - ✓ Require status checks to pass before merging
#      - ✓ Require branches to be up to date before merging
#      - Add status checks: "quality-checks"
#    - ✓ Require conversation resolution before merging
#    - ✓ Do not allow bypassing the above settings (enforce for admins)
# 6. Click "Create" to save the rule
# 7. Repeat for "develop" branch if using a develop branch workflow
