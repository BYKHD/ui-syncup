name: CI Quality Checks

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  quality-checks:
    name: Quality Checks
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      
      - name: Install dependencies
        run: bun install
      
      - name: TypeScript type checking
        run: bun run typecheck
      
      - name: ESLint linting
        run: bun run lint
      
      - name: Run tests
        run: bun run test
      
      - name: Production build
        run: bun run build
