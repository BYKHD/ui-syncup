name: E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancel in-progress runs for same workflow + ref
concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Explicit permissions
permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  test:
    name: Run E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ui_syncup_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: '1.1.38'

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: |
            .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/bun.lockb') }}-${{ hashFiles('**/*.ts', '**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/bun.lockb') }}-

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/bun.lockb') }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Setup environment variables
        run: |
          cp .env.test .env.local
          echo "DATABASE_URL=postgresql://postgres:postgres@localhost:5432/ui_syncup_test" >> .env.local
          echo "BETTER_AUTH_SECRET=${{ secrets.BETTER_AUTH_SECRET }}" >> .env.local
          echo "BETTER_AUTH_URL=http://localhost:3000" >> .env.local
          echo "RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}" >> .env.local
          echo "RESEND_FROM_EMAIL=noreply@example.com" >> .env.local

      - name: Run database migrations
        run: bun run db:push
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ui_syncup_test

      - name: Build application
        run: bun run build
        timeout-minutes: 10

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: bunx playwright install chromium --with-deps

      - name: Install Playwright dependencies only
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: bunx playwright install-deps chromium

      - name: Start application server
        run: |
          bun run start > server.log 2>&1 &
          echo $! > server.pid

          echo "Waiting for server to be ready..."
          max_attempts=30
          attempt=0
          until curl -f http://localhost:3000 -o /dev/null -s || [ $attempt -eq $max_attempts ]; do
            echo "Waiting for server... attempt $((attempt+1))/$max_attempts"
            attempt=$((attempt+1))
            sleep 2
          done

          if [ $attempt -eq $max_attempts ]; then
            echo "Server failed to start. Server logs:"
            cat server.log
            exit 1
          fi

          echo "Server is ready"
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ui_syncup_test

      - name: Run E2E tests
        run: bun run test:ui
        env:
          CI: true
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ui_syncup_test

      - name: Stop application server
        if: always()
        run: |
          if [ -f server.pid ]; then
            kill $(cat server.pid) || true
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: playwright-report/
          retention-days: 7

      - name: Upload test videos and traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-failures-${{ github.run_id }}
          path: test-results/
          retention-days: 7

      - name: Upload server logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: server-logs-${{ github.run_id }}
          path: server.log
          retention-days: 3

      - name: Publish test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: test-results/junit.xml
          check_name: E2E Test Results
