# ============================================================================
# UI SyncUp — Local Development Infrastructure
# ============================================================================
#
# Postgres is managed by Supabase CLI — start it first:
#   bun run supabase:start
#
# Then start the remaining services:
#   docker compose -f docker/compose.local.yml up -d
#
# Run the app:
#   bun run dev
#
# Services:
#   redis     → localhost:6379
#   minio     → localhost:9000 (S3 API) / localhost:9001 (console)
#   mailpit   → localhost:1025 (SMTP)   / localhost:8025 (web UI)
# ============================================================================

name: ui-syncup-local

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_local:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 10

  postgres:
    image: postgres:17
    restart: always
    profiles: [ "db" ]
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-syncup}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-passgres}
      POSTGRES_DB: ${POSTGRES_DB:-ui_syncup}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-syncup} -d ${POSTGRES_DB:-ui_syncup}" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  db-migrate:
    image: oven/bun:1
    profiles: [ "db" ]
    working_dir: /app
    volumes:
      - ../:/app
    environment:
      DIRECT_URL: postgresql://${POSTGRES_USER:-syncup}:${POSTGRES_PASSWORD:-passgres}@postgres:5432/${POSTGRES_DB:-ui_syncup}
    command: bun run db:migrate
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: miniopass
    volumes:
      - minio_local:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: [ "CMD", "mc", "ready", "local" ]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set myminio http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
        mc mb --ignore-existing myminio/${STORAGE_BUCKET:-ui-syncup-storage};
        if [ \"$${STORAGE_PUBLIC_ACCESS}\" = \"true\" ]; then
          mc anonymous set download myminio/${STORAGE_BUCKET:-ui-syncup-storage};
        fi;
        exit 0;
      "

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:8025/" ]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  redis_local:
  postgres_data:
  minio_local:
