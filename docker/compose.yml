# ============================================================================
# UI SyncUp — Production Self-Hosting Compose
# ============================================================================
#
# Quick start (fully external services):
#   docker compose -f docker/compose.yml up -d
#
# With bundled infrastructure:
#   docker compose -f docker/compose.yml \
#     --profile db --profile cache --profile storage up -d
#
# Profile reference:
#   --profile db       → postgres:15-alpine
#   --profile cache    → redis:7-alpine
#   --profile storage  → minio + minio-init (bucket creation)
#   --profile mail     → mailpit (SMTP catcher + web UI at :8025)
#
# Tip: Set COMPOSE_PROFILES=db,cache,storage,mail in .env for bare `docker compose up -d`
# ============================================================================

name: ${COMPOSE_PROJECT_NAME:-ui-syncup}

services:
  app:
    # Replace :latest with your desired version or :beta for pre-releases
    image: ghcr.io/bykhd/ui-syncup:latest
    restart: always
    # By default, the app port is published directly to the host for standalone
    # deployments (no reverse proxy). If you are using Traefik (or another
    # reverse proxy), comment out `ports` and uncomment `expose` + `labels`.
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    # expose:
    #   - "${PORT:-3000}"
    env_file:
      - path: .env
        required: false
    environment:
      - NODE_ENV=${NODE_ENV:-production}
    # Runs DB migrations before the Next.js server starts.
    # Migration failure exits the container before any traffic is served.
    command: >
      sh -c "bun run db:migrate && node server.js"
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:3000/api/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    # Traefik labels — uncomment if you are using Traefik as a reverse proxy.
    # Also switch `ports` to `expose` above when enabling these.
    # labels:
    #   - "traefik.enable=true"
    #   - "traefik.docker.network=${TRAEFIK_NETWORK:-dokploy-network}"
    #   - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-ui-syncup}.rule=Host(`${APP_HOST}`)"
    #   - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-ui-syncup}.entrypoints=websecure"
    #   - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-ui-syncup}.tls=true"
    #   - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-ui-syncup}.tls.certresolver=letsencrypt"
    #   - "traefik.http.services.${COMPOSE_PROJECT_NAME:-ui-syncup}.loadbalancer.server.port=${PORT:-3000}"
    depends_on:
      postgres:
        condition: service_healthy
        required: false
      redis:
        condition: service_healthy
        required: false

  postgres:
    image: postgres:17
    restart: always
    profiles: [ "db" ]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-syncup}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-}
      POSTGRES_DB: ${POSTGRES_DB:-ui_syncup}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-syncup} -d ${POSTGRES_DB:-ui_syncup}" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: always
    profiles: [ "cache" ]
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: always
    profiles: [ "storage" ]
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: [ "CMD", "mc", "ready", "local" ]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    profiles: [ "storage" ]
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"
    entrypoint: >
      /bin/sh -c "
        mc alias set myminio http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
        mc mb --ignore-existing myminio/${STORAGE_ATTACHMENTS_BUCKET:-ui-syncup-attachments};
        mc mb --ignore-existing myminio/${STORAGE_MEDIA_BUCKET:-ui-syncup-media};
        mc anonymous set download myminio/${STORAGE_ATTACHMENTS_BUCKET:-ui-syncup-attachments};
        mc anonymous set download myminio/${STORAGE_MEDIA_BUCKET:-ui-syncup-media};
        exit 0;
      "

  mailpit:
    image: axllent/mailpit:latest
    restart: always
    profiles: [ "mail" ]
    ports:
      - "8025:8025"
    expose:
      - "1025"
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:8025/" ]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  minio_data:


